<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | DAESINLOAN</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
<main class="login-page">
  <section class="login-card" aria-labelledby="login-title">
    <div class="login-card__header">
      <div class="login-card__brand">DAESINLOAN.</div>
      <h1 class="login-card__title" id="login-title">관리자 로그인</h1>
    </div>

    <form class="login-form" action="00-01_dashboard_hq.html" method="get">
      <div class="field">
        <label for="login-id">아이디</label>
        <input id="login-id" class="input" type="text" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="login-password">패스워드</label>
        <input id="login-password" class="input" type="password" autocomplete="current-password" required>
      </div>
      <div class="field">
        <label for="login-auth-code">인증코드</label>
        <input id="login-auth-code" class="input" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="6자리" required>
      </div>
      <button type="button" class="btn btn--primary" onclick="location.href='00-01_dashboard_hq.html'">로그인</button>
      <p class="login-help">계정 정보 확인이 필요한 경우 관리자에게 문의 하세요.</p>
    </form>
  </section>
</main>
</body>
</html>
