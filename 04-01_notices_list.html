<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 | DAESINLOAN</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/notices.css">
</head>
<body>
<div class="app">
  <div id="sidebar-root"></div>

  <main class="app__main">
    <header class="page-header">
      <h1>공지사항</h1>
      <div class="notice-page-actions">
        <a href="04-04_notices_register.html" class="btn btn--primary">등록</a>
      </div>
    </header>

    <section class="page-body">
      <form class="notice-filter-bar" onsubmit="return false;">
        <div class="field">
          <label for="notice-category">구분</label>
          <select id="notice-category" class="select">
            <option>전체</option>
            <option>공지</option>
            <option>업데이트</option>
            <option>점검</option>
            <option>안내</option>
          </select>
        </div>
        <div class="field">
          <label for="notice-status">공개여부</label>
          <select id="notice-status" class="select">
            <option>전체</option>
            <option>공개</option>
            <option>비공개</option>
          </select>
        </div>
        <div class="field field--search">
          <label for="notice-keyword">검색</label>
          <div class="field__combo">
            <input id="notice-keyword" class="input" type="text" placeholder="검색어">
            <select class="select" aria-label="검색 구분">
              <option>제목</option>
              <option>내용</option>
              <option>작성자</option>
            </select>
          </div>
        </div>
        <div class="notice-filter-bar__actions">
          <button type="submit" class="btn btn--primary">검색실행</button>
          <button type="reset" class="btn btn--outline">검색취소</button>
        </div>
      </form>

      <div class="table-wrap notices-table-wrap">
        <table class="table notices-table">
          <thead>
            <tr>
              <th class="notices-table__col-check"><input type="checkbox" aria-label="전체 선택"></th>
              <th class="notices-table__col-no">NO</th>
              <th class="notices-table__col-category">구분</th>
              <th class="notices-table__col-title">제목</th>
              <th class="notices-table__col-author">작성자</th>
              <th class="notices-table__col-date">등록일</th>
              <th class="notices-table__col-views">조회수</th>
              <th class="notices-table__col-file">첨부</th>
              <th class="notices-table__col-action">관리</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="u-center"><input type="checkbox" aria-label="행 선택"></td>
              <td class="u-center">5</td>
              <td class="u-center"><span class="notice-badge notice-badge--important">중요</span></td>
              <td><a class="notice-title-link" href="04-02_notices_detail.html">대출 모집인 전산 사용 기준 안내</a></td>
              <td class="u-center">관리자</td>
              <td class="u-center">2026-05-09</td>
              <td class="u-num">128</td>
              <td class="u-center"><button type="button" class="notice-file-icon" data-download-file="대출모집인_전산사용기준.pdf" aria-label="첨부파일 다운로드"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l9.8-9.8a4 4 0 0 1 5.7 5.7l-9.8 9.8a2 2 0 0 1-2.8-2.8l9.4-9.4"/></svg></button></td>
              <td class="u-center"><button type="button" class="btn--row-delete">삭제</button></td>
            </tr>
            <tr>
              <td class="u-center"><input type="checkbox" aria-label="행 선택"></td>
              <td class="u-center">4</td>
              <td class="u-center"><span class="notice-badge">점검</span></td>
              <td><a class="notice-title-link" href="04-02_notices_detail.html">시스템 정기 점검 일정 안내</a></td>
              <td class="u-center">운영팀</td>
              <td class="u-center">2026-05-07</td>
              <td class="u-num">94</td>
              <td class="u-center"><button type="button" class="notice-file-icon" data-download-file="시스템_정기점검_일정.pdf" aria-label="첨부파일 다운로드"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l9.8-9.8a4 4 0 0 1 5.7 5.7l-9.8 9.8a2 2 0 0 1-2.8-2.8l9.4-9.4"/></svg></button></td>
              <td class="u-center"><button type="button" class="btn--row-delete">삭제</button></td>
            </tr>
            <tr>
              <td class="u-center"><input type="checkbox" aria-label="행 선택"></td>
              <td class="u-center">3</td>
              <td class="u-center"><span class="notice-badge">업데이트</span></td>
              <td><a class="notice-title-link" href="04-02_notices_detail.html">상품관리 화면 입력 항목 업데이트</a></td>
              <td class="u-center">관리자</td>
              <td class="u-center">2026-05-02</td>
              <td class="u-num">76</td>
              <td class="u-center">-</td>
              <td class="u-center"><button type="button" class="btn--row-delete">삭제</button></td>
            </tr>
            <tr>
              <td class="u-center"><input type="checkbox" aria-label="행 선택"></td>
              <td class="u-center">2</td>
              <td class="u-center"><span class="notice-badge">안내</span></td>
              <td><a class="notice-title-link" href="04-02_notices_detail.html">첨부파일 등록 정책 안내</a></td>
              <td class="u-center">운영팀</td>
              <td class="u-center">2026-04-29</td>
              <td class="u-num">51</td>
              <td class="u-center"><button type="button" class="notice-file-icon" data-download-file="첨부파일_등록정책.pdf" aria-label="첨부파일 다운로드"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l9.8-9.8a4 4 0 0 1 5.7 5.7l-9.8 9.8a2 2 0 0 1-2.8-2.8l9.4-9.4"/></svg></button></td>
              <td class="u-center"><button type="button" class="btn--row-delete">삭제</button></td>
            </tr>
            <tr>
              <td class="u-center"><input type="checkbox" aria-label="행 선택"></td>
              <td class="u-center">1</td>
              <td class="u-center"><span class="notice-badge">공지</span></td>
              <td><a class="notice-title-link" href="04-02_notices_detail.html">관리자 게시판 운영 원칙</a></td>
              <td class="u-center">관리자</td>
              <td class="u-center">2026-04-23</td>
              <td class="u-num">33</td>
              <td class="u-center">-</td>
              <td class="u-center"><button type="button" class="btn--row-delete">삭제</button></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="notice-footer">
        <div class="notice-footer__info">전체 <strong>5</strong> 개</div>
        <nav class="pagination" aria-label="페이지 이동">
          <button disabled>«</button>
          <button disabled>‹</button>
          <button class="is-active">1</button>
          <button disabled>›</button>
          <button disabled>»</button>
        </nav>
        <div class="notice-footer__pages">Total 1 Pages</div>
      </div>
    </section>
  </main>
</div>
<script src="js/sidebar-render.js"></script>
<script src="js/notices.js"></script>
</body>
</html>
