<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지사 등록 | DAESINLOAN</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/branches.css">
</head>
<body>
<div class="app">
  <div id="sidebar-root"></div>

  <main class="app__main">
    <header class="page-header">
      <h1>지사관리</h1>
      <div class="branch-page-actions">
        <a href="05-01_branches_list.html" class="btn btn--outline">목록으로</a>
      </div>
    </header>

    <section class="page-body">
      <form class="branch-panel" action="#" method="post">
        <table class="branch-form-grid">
          <tbody>
            <tr><th scope="row"><label for="branch-name">지사명</label></th><td><input id="branch-name" class="input" type="text"></td></tr>
            <tr><th scope="row"><label for="branch-code">지사코드</label></th><td><input id="branch-code" class="input" type="text"></td></tr>
            <tr><th scope="row"><label for="branch-id">아이디</label></th><td><input id="branch-id" class="input" type="text" pattern="[A-Za-z0-9]+" title="아이디는 영문과 숫자만 입력할 수 있습니다."></td></tr>
            <tr><th scope="row"><label for="branch-password">비밀번호</label></th><td><div class="password-field"><input id="branch-password" class="input" type="password"><button type="button" class="password-field__toggle" aria-label="비밀번호 보기" aria-pressed="false" data-password-toggle="#branch-password"><svg class="password-field__icon password-field__icon--show" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"></path><circle cx="12" cy="12" r="3"></circle></svg><svg class="password-field__icon password-field__icon--hide" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"></path><circle cx="12" cy="12" r="3"></circle><path d="M4 4l16 16"></path></svg></button></div></td></tr>
            <tr><th scope="row"><label for="branch-auth-code">인증코드</label></th><td><input id="branch-auth-code" class="input" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="6자리"></td></tr>
            <tr><th scope="row"><label for="branch-role">권한</label></th><td><select id="branch-role" class="select"><option>총괄관리자</option><option selected>지사</option><option>금융사</option><option>대출사</option><option>관리자</option></select></td></tr>
            <tr><th scope="row">수수료구분</th><td><div class="branch-inline-options"><label><input type="radio" name="fee-type" value="basic" checked> 기본수수료</label><label><input type="radio" name="fee-type" value="finance"> 금융사 별 수수료</label></div></td></tr>
            <tr data-fee-section="basic">
              <th scope="row">기본 수수료</th>
              <td>
                <table class="branch-fee-table">
                  <thead><tr><th>금액</th><th>지급수수료(%)</th></tr></thead>
                  <tbody><tr><td>500만원 이하</td><td><input class="input" type="text" value="0.00"></td></tr><tr><td>500 ~ 1000만원</td><td><input class="input" type="text" value="0.00"></td></tr><tr><td>1000만원 이상</td><td><input class="input" type="text" value="0.00"></td></tr></tbody>
                </table>
              </td>
            </tr>
            <tr data-fee-section="finance" hidden>
              <th scope="row">금융사 별 수수료</th>
              <td>
                <table class="branch-fee-table">
                  <thead><tr><th>상품명</th><th>~ 500만원</th><th>500 ~ 1000만원</th><th>1000만원 ~</th></tr></thead>
                  <tbody><tr><td>한성 EF-G론</td><td><input class="input" type="text" value="0.00"></td><td><input class="input" type="text" value="0.00"></td><td><input class="input" type="text" value="0.00"></td></tr><tr><td>직장인 신용대출</td><td><input class="input" type="text" value="0.00"></td><td><input class="input" type="text" value="0.00"></td><td><input class="input" type="text" value="0.00"></td></tr></tbody>
                </table>
              </td>
            </tr>
            <tr><th scope="row"><label for="branch-company">회사명(지점명)</label></th><td><input id="branch-company" class="input" type="text"></td></tr>
            <tr><th scope="row"><label for="branch-manager">담당자 명</label></th><td><input id="branch-manager" class="input" type="text"></td></tr>
            <tr><th scope="row">전화번호</th><td><input class="input" type="text"></td></tr>
            <tr><th scope="row">핸드폰번호</th><td><input class="input" type="text"></td></tr>
            <tr>
              <th scope="row">주소</th>
              <td>
                <div class="branch-address">
                  <div class="branch-address-row">
                    <input class="input branch-address-zip" type="text" inputmode="numeric">
                    <button type="button" class="btn btn--outline branch-address-search">주소검색</button>
                  </div>
                  <div class="branch-address-row">
                    <input class="input branch-address-main" type="text">
                    <input class="input branch-address-detail" type="text">
                  </div>
                </div>
              </td>
            </tr>
            <tr><th scope="row">상품숨김</th><td><div class="branch-inline-options"><label><input type="radio" name="hide-product" checked> 정상</label><label><input type="radio" name="hide-product"> 숨김</label></div></td></tr>
            <tr><th scope="row">사용여부</th><td><div class="branch-inline-options"><label><input type="radio" name="use-yn" checked> 사용</label><label><input type="radio" name="use-yn"> 사용안함</label></div></td></tr>
            <tr><th scope="row" colspan="2" class="branch-section-title">대출경로표시 정보</th></tr>
            <tr><th scope="row"><label for="branch-route-company">업체명</label></th><td><input id="branch-route-company" class="input" type="text"></td></tr>
            <tr><th scope="row"><label for="branch-route-association-no">협회등록번호</label></th><td><input id="branch-route-association-no" class="input" type="text"></td></tr>
            <tr><th scope="row"><label for="branch-route-loan-business-no">대부업번호</label></th><td><input id="branch-route-loan-business-no" class="input" type="text"></td></tr>
            <tr><th scope="row"><label for="branch-route-phone">전화번호</label></th><td><input id="branch-route-phone" class="input" type="text"></td></tr>
          </tbody>
        </table>
        <div class="branch-actions">
          <button type="submit" class="btn btn--primary">등록</button>
          <a href="05-01_branches_list.html" class="btn btn--outline">취소</a>
        </div>
      </form>
    </section>
  </main>
</div>
<script src="js/sidebar-render.js"></script>
<script src="js/branches-password-toggle.js"></script>
<script src="js/branches-fee-toggle.js"></script>
</body>
</html>
