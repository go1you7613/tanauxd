<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모집인 상세 | DAESINLOAN</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/recruiters.css">
</head>
<body>
<div class="app">
  <div id="sidebar-root"></div>

  <main class="app__main">
    <header class="page-header">
      <h1>모집인 관리</h1>
      <div class="recruiter-page-actions">
        <a href="06-01_recruiters_list.html" class="btn btn--outline">목록으로</a>
        <button type="button" class="btn btn--primary" id="recruiter-btn-edit">수정</button>
      </div>
    </header>

    <section class="page-body">
      <div class="recruiter-panel recruiter-detail-view">
        <table class="recruiter-form-grid">
          <tbody>
            <tr><th scope="row">금융사</th><td><span class="recruiter-readonly-value">삼호AG</span></td></tr>
            <tr><th scope="row">지사</th><td><span class="recruiter-readonly-value">본사</span></td></tr>
            <tr><th scope="row">모집인 등록번호</th><td><span class="recruiter-readonly-value">10-00014543</span></td></tr>
            <tr><th scope="row">모집인명</th><td><span class="recruiter-readonly-value">김성수(삼호)</span></td></tr>
            <tr><th scope="row">모집인번호</th><td><span class="recruiter-readonly-value">10-00014543</span></td></tr>
            <tr><th scope="row">전화번호</th><td><span class="recruiter-readonly-value">010-1111-1111</span></td></tr>
            <tr><th scope="row">등록일</th><td><span class="recruiter-readonly-value">2026-05-09</span></td></tr>
          </tbody>
        </table>
        <div class="recruiter-actions">
          <a href="06-01_recruiters_list.html" class="btn btn--outline">목록</a>
        </div>
      </div>

      <form class="recruiter-panel recruiter-detail-edit" action="#" method="post" hidden>
        <table class="recruiter-form-grid">
          <tbody>
            <tr><th scope="row"><label for="recruiter-finance">금융사</label></th><td><select id="recruiter-finance" class="select"><option selected>삼호AG</option><option>오케이엔AG</option><option>문키AG</option><option>프라</option></select></td></tr>
            <tr><th scope="row"><label for="recruiter-branch">지사</label></th><td><select id="recruiter-branch" class="select"><option selected>본사</option><option>jsm</option><option>프라</option></select></td></tr>
            <tr><th scope="row"><label for="recruiter-reg-code">모집인 등록번호</label></th><td><input id="recruiter-reg-code" class="input" type="text" value="10-00014543"></td></tr>
            <tr><th scope="row"><label for="recruiter-name">모집인명</label></th><td><input id="recruiter-name" class="input" type="text" value="김성수(삼호)"></td></tr>
            <tr><th scope="row"><label for="recruiter-code">모집인번호</label></th><td><input id="recruiter-code" class="input" type="text" value="10-00014543"></td></tr>
            <tr><th scope="row"><label for="recruiter-phone">전화번호</label></th><td><input id="recruiter-phone" class="input" type="tel" value="010-1111-1111"></td></tr>
            <tr><th scope="row"><label for="recruiter-date">등록일</label></th><td><input id="recruiter-date" class="input" type="date" value="2026-05-09"></td></tr>
          </tbody>
        </table>
        <div class="recruiter-actions">
          <button type="submit" class="btn btn--primary">저장</button>
          <button type="button" class="btn btn--outline" id="recruiter-btn-cancel">취소</button>
        </div>
      </form>
    </section>
  </main>
</div>
<script src="js/recruiters-detail-mode.js"></script>
<script src="js/sidebar-render.js"></script>
</body>
</html>
