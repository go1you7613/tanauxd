<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코드관리 | DAESINLOAN</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/system.css">
</head>
<body>
<div class="app">
  <div id="sidebar-root"></div>

  <main class="app__main">
    <header class="page-header">
      <h1>코드관리</h1>
      <div class="system-page-actions">
        <button type="button" class="btn btn--primary" data-code-modal-open="create">등록</button>
      </div>
    </header>

    <section class="page-body">
      <div class="system-layout system-layout--single">
        <div class="system-stack">
          <form class="system-filter-bar" onsubmit="return false;">
            <div class="field">
              <label for="code-group">코드그룹</label>
              <select id="code-group" class="select">
                <option>전체</option>
                <option>대출상태</option>
                <option>상품구분</option>
                <option>첨부파일구분</option>
                <option>권한유형</option>
              </select>
            </div>
            <div class="field">
              <label for="code-keyword">코드명</label>
              <input id="code-keyword" class="input" type="text">
            </div>
            <div class="field">
              <label for="code-use">사용여부</label>
              <select id="code-use" class="select">
                <option>전체</option>
                <option>사용</option>
                <option>사용안함</option>
              </select>
            </div>
            <div class="system-filter-bar__actions">
              <button type="submit" class="btn btn--primary">검색실행</button>
              <button type="reset" class="btn btn--outline">검색취소</button>
            </div>
          </form>

          <div class="table-wrap system-table-wrap">
            <table class="table system-table">
              <thead>
                <tr>
                  <th class="system-table__col-no">번호</th>
                  <th class="system-table__col-type">코드그룹</th>
                  <th class="system-table__col-code">코드값</th>
                  <th class="system-table__col-name">코드명</th>
                  <th class="system-table__col-order">정렬</th>
                  <th class="system-table__col-status">사용여부</th>
                  <th class="system-table__col-desc">설명</th>
                  <th class="system-table__col-action">관리</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>대출상태</td>
                  <td>RECEIVED</td>
                  <td>접수</td>
                  <td>10</td>
                  <td><span class="badge badge--success">사용</span></td>
                  <td>대출 신청 접수 상태</td>
                  <td><button type="button" class="btn--row-edit" data-code-modal-open="edit">수정</button></td>
                </tr>
                <tr>
                  <td>2</td>
                  <td>대출상태</td>
                  <td>APPROVED</td>
                  <td>승인</td>
                  <td>20</td>
                  <td><span class="badge badge--success">사용</span></td>
                  <td>승인 완료 상태</td>
                  <td><button type="button" class="btn--row-edit" data-code-modal-open="edit">수정</button></td>
                </tr>
                <tr>
                  <td>3</td>
                  <td>상품구분</td>
                  <td>WORKER</td>
                  <td>직장인</td>
                  <td>10</td>
                  <td><span class="badge badge--success">사용</span></td>
                  <td>직장인 신용대출 상품군</td>
                  <td><button type="button" class="btn--row-edit" data-code-modal-open="edit">수정</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </section>
  </main>
</div>
<div class="system-modal" id="code-modal" aria-hidden="true">
  <div class="system-modal__backdrop" data-code-modal-close></div>
  <form class="system-modal__dialog" onsubmit="return false;" role="dialog" aria-modal="true" aria-labelledby="code-modal-title">
    <div class="system-modal__header">
      <h2 id="code-modal-title">코드 등록/수정</h2>
      <button type="button" class="system-modal__close" data-code-modal-close aria-label="닫기">×</button>
    </div>
    <table class="system-form-grid">
      <tbody>
        <tr>
          <th><label for="code-form-group">코드그룹</label></th>
          <td><input id="code-form-group" class="input" type="text" value="대출상태"></td>
        </tr>
        <tr>
          <th><label for="code-form-value">코드값</label></th>
          <td><input id="code-form-value" class="input" type="text" value="RECEIVED"></td>
        </tr>
        <tr>
          <th><label for="code-form-name">코드명</label></th>
          <td><input id="code-form-name" class="input" type="text" value="접수"></td>
        </tr>
        <tr>
          <th><label for="code-form-order">정렬</label></th>
          <td><input id="code-form-order" class="input" type="number" value="10"></td>
        </tr>
        <tr>
          <th>사용여부</th>
          <td>
            <div class="system-inline-options">
              <label><input type="radio" name="code-use-flag" value="사용" checked> 사용</label>
              <label><input type="radio" name="code-use-flag" value="사용안함"> 사용안함</label>
            </div>
          </td>
        </tr>
        <tr>
          <th><label for="code-form-desc">설명</label></th>
          <td><textarea id="code-form-desc" class="system-textarea">대출 신청 접수 상태</textarea></td>
        </tr>
      </tbody>
    </table>
    <div class="system-actions">
      <button type="submit" class="btn btn--primary">저장</button>
      <button type="reset" class="btn btn--outline">초기화</button>
    </div>
  </form>
</div>
<script src="js/system-code-modal.js"></script>
<script src="js/sidebar-render.js"></script>
</body>
</html>
